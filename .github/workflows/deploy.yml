name: Build & Deploy

on:
  push:
    branches: ['main']

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ====================================================
  # 1. СБОРКА И ПУБЛИКАЦИЯ ОБРАЗА
  # ====================================================
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          # Кэширование (ускоряет сборку)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ====================================================
  # 1b. СБОРКА И ПУБЛИКАЦИЯ ОБРАЗА AUTH-СЕРВИСА (Этап B6)
  # ====================================================
  # Отдельный образ: packages/auth не тянет Rust/Vite, деплоится как
  # самостоятельный сервис (свой домен, PostgreSQL) — см. docs/en/deployment.md
  build_and_push_auth:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Lowercase Image Name
        run: |
          echo "AUTH_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}-auth" >> $GITHUB_ENV
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/auth/Dockerfile
          push: true
          tags: ${{ env.AUTH_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  # ====================================================
  # 2. ПОДГОТОВКА СПИСКА СЕРВЕРОВ
  # ====================================================
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6.0.2
      - id: set-matrix
        env:
          # Конфигурации из GitHub Repository Variables
          SERVERS_JSON: ${{ vars.SERVERS_MATRIX }}
        run: |
          # Формат JSON в одну строку
          JSON=$(echo "$SERVERS_JSON" | jq -c .)
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  # ====================================================
  # 3. ДЕПЛОЙ НА КАЖДЫЙ СЕРВЕР
  # ====================================================
  deploy:
    needs: [build_and_push, prepare-matrix]
    runs-on: ubuntu-latest
    strategy:
      # Если один сервер упал/не настроен, остальные продолжат обновляться
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.servers) }}

    steps:
      - name: Lowercase Image Name for Deploy
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Deploy to ${{ matrix.domain }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VIMP_DOMAIN: ${{ matrix.domain }}
          VIMP_PORT: ${{ matrix.port }}
          # общий для всех мастеров central auth-сервис (Этап B6); задаётся
          # один раз в Settings → Variables, см. docs/en/deployment.md
          VIMP_AUTH_SERVICE_URL: ${{ vars.AUTH_SERVICE_URL }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ matrix.ip }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Передача переменных окружения внутрь скрипта SSH
          envs: IMAGE_NAME,VIMP_DOMAIN,VIMP_PORT,VIMP_AUTH_SERVICE_URL,GITHUB_ACTOR,GITHUB_TOKEN
          script: |
            # Остановка выполнения при любой критической ошибке
            set -e

            PROJECT_DIR="$HOME/vimp_projects/${VIMP_DOMAIN}"

            echo "🔍 Checking status for ${VIMP_DOMAIN}..."

            # Если папки нет, значит сервер не был настроен через add-server.sh.
            # Пропуск деплоя, но выход с кодом 0 (Success), чтобы пайплайн остался зеленым.
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "========================================================"
              echo "⚠️  SKIP: Server is not configured on VPS."
              echo "   Directory '$PROJECT_DIR' does not exist."
              echo "   Run './add-server.sh' on the server to setup first."
              echo "========================================================"
              echo "❌ ERROR: Deployment failed because folder is missing."
              exit 1
            fi
            # -----------------------

            cd "$PROJECT_DIR"

            echo "🔐 Logging into GHCR..."
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            echo "📄 Generating .env config..."

            {
              echo "NODE_ENV=production"
              echo "VIMP_DOMAIN=$VIMP_DOMAIN"
              if [ -n "$VIMP_AUTH_SERVICE_URL" ]; then
                echo "VIMP_AUTH_SERVICE_URL=$VIMP_AUTH_SERVICE_URL"
              fi
            } > .env.prod


            echo "🐳 Generating docker-compose.yml..."
            # Конфиг Docker.
            # container_name должен быть уникальным для каждого домена.
            # ports: 127.0.0.1 - чтобы порт был закрыт снаружи (безопасность).
            {
              echo "services:"
              echo "  master:"
              echo "    image: $IMAGE_NAME:latest"
              echo "    container_name: \"vimp-${VIMP_DOMAIN}\""
              echo "    restart: always"
              echo "    env_file: .env.prod"
              echo "    ports:"
              # СЛЕВА: Порт на сервере (уникальный из JSON, например 3005)
              # СПРАВА: Порт мастера внутри контейнера (всегда 3002)
              echo "      - \"127.0.0.1:${VIMP_PORT}:3002\""
            } > docker-compose.yml

            echo "🚀 Pulling and Restarting..."

            # Обновление образа
            docker compose pull

            # Пересоздание контейнера (удалит старый и запустит новый)
            docker compose up -d --force-recreate --remove-orphans

            # Чистка старых неиспользуемых образов, чтобы не забивать диск
            docker image prune -f || true

            echo "✅ Deployment Finished for ${VIMP_DOMAIN}"
