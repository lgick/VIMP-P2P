name: Lint & Test

# запуск на каждый push и pull request
on:
  push:
    branches: ['**']
  pull_request:

# lint не требует Rust; engine доказывает, что движковые тесты (cargo +
# vitest engine-*) проходят БЕЗ единого Rust-артефакта игры (fixture-миниигра,
# packages/engine/tests/fixtures/miniGame/) и гоняет vitest-проект auth
# (packages/auth — central auth-сервис, чистый Node/Express, без Rust/WASM
# зависимостей). Игровые (tanks/integration) job'ы переехали в CI
# репозитория игры (A3.5 плана отделения движка).
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (vimp-engine-core)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-engine-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Rust tests (движковый crate)
        run: cargo test -p vimp-engine-core

      - name: JS tests (движок, без Rust-артефактов игры)
        run: npx vitest run --project engine-node --project engine-client

      - name: JS tests (central auth-сервис, packages/auth — не тянет Rust)
        run: npx vitest run --project auth
