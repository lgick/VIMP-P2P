[package]
name = "vimp-engine-core"
version = "0.1.0"
edition = "2024"
description = "VIMP Engine — движковый каркас симуляции (физика, карта, снапшот-фрейминг, интерполяция/предикт/raycast-примитивы, нав-утилиты). Без wasm-bindgen — обёртки для WASM-ABI собирает game-crate."
license = "MIT"
repository = "https://github.com/lgick/VIMP-P2P"

[lib]
crate-type = ["rlib"]

[dependencies]
indexmap = { workspace = true }
rapier2d = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
